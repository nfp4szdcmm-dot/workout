const STYLES = `
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

.wd-root {
  --paper:#F4F0E8; --surface:#FFFFFF; --surface2:#FBF8F3;
  --ink:#1C1A17; --ink2:#736C62; --ink3:#A39B8E;
  --line:#EAE3D7; --line2:#F2ECE2;
  --coral:#F4533A; --coral-soft:#FDE6E0; --coral-ink:#B5331F;
  --teal:#1E7A66; --teal-soft:#DCEFE8;
  --gold:#D98A21; --gold-soft:#FBEBD2;
  --violet:#6A56C9; --violet-soft:#E8E3F8;
  --blue:#2E72C4; --blue-soft:#DDEAF8;
  --shadow:0 1px 2px rgba(28,26,23,.04), 0 8px 24px rgba(28,26,23,.06);

  font-family:'Hanken Grotesk', system-ui, sans-serif;
  color:var(--ink);
  background:var(--paper);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wd-display { font-family:'Bricolage Grotesque', sans-serif; font-weight:800; letter-spacing:-.02em; }

.wd-shell { max-width:760px; margin:0 auto; padding:0 0 110px; position:relative; }

.wd-top { padding:22px 20px 10px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.wd-top h1 { font-size:13px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink2); margin:0 0 4px; }
.wd-top .big { font-size:27px; line-height:1.05; margin:0; }
.wd-avatar { width:46px; height:46px; border-radius:14px; background:var(--ink); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-family:'Bricolage Grotesque'; flex-shrink:0; box-shadow:var(--shadow); }

.wd-card { background:var(--surface); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow); }
.wd-pad { padding:18px; }
.wd-sec { margin:14px 20px; }
.wd-sec-h { display:flex; align-items:center; gap:9px; margin:0 0 11px; }
.wd-sec-h .ico { width:30px; height:30px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.wd-sec-h h2 { font-size:16px; margin:0; font-weight:700; font-family:'Bricolage Grotesque'; letter-spacing:-.01em; }
.wd-sec-h .sub { font-size:12px; color:var(--ink3); margin-left:auto; font-weight:600; }

.wd-hero { margin:6px 20px 16px; border-radius:22px; padding:20px; color:#fff; position:relative; overflow:hidden; box-shadow:var(--shadow-lg); }
.wd-hero::after { content:''; position:absolute; right:-40px; top:-40px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.10); }
.wd-hero::before { content:''; position:absolute; right:30px; bottom:-60px; width:130px; height:130px; border-radius:50%; background:rgba(255,255,255,.07); }
.wd-hero .tag { font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; opacity:.85; }
.wd-hero .ttl { font-size:26px; margin:3px 0 2px; position:relative; }
.wd-hero .meta { font-size:13px; opacity:.9; display:flex; gap:14px; flex-wrap:wrap; margin-top:8px; }
.wd-hero .meta span { display:inline-flex; align-items:center; gap:5px; }

.wd-banner { margin:6px 20px 0; background:linear-gradient(135deg,#1E7A66,#2E72C4); color:#fff; border-radius:16px; padding:13px 15px; display:flex; align-items:center; gap:12px; box-shadow:var(--shadow-lg); }
.wd-banner .bt { flex:1; }
.wd-banner .bt .t { font-weight:800; font-family:'Bricolage Grotesque'; font-size:15px; }
.wd-banner .bt .s { font-size:12px; opacity:.9; font-weight:600; }
.wd-banner button { background:#fff; color:var(--teal); border:none; border-radius:11px; padding:10px 14px; font-weight:800; font-family:'Bricolage Grotesque'; cursor:pointer; font-size:13px; white-space:nowrap; display:flex; align-items:center; gap:6px; }

.wd-ring-wrap { position:relative; flex-shrink:0; }
.wd-ring-txt { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; font-family:'Bricolage Grotesque'; }

.wd-ex { border:1px solid var(--line); border-radius:16px; margin-bottom:10px; background:var(--surface); overflow:hidden; transition:border-color .15s; }
.wd-ex.done { background:var(--surface2); border-color:var(--line2); }
.wd-ex-top { display:flex; align-items:center; gap:12px; padding:13px 14px; cursor:pointer; }
.wd-check { width:26px; height:26px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; background:none; padding:0; }
.wd-ex-name { font-weight:700; font-size:15px; line-height:1.2; }
.wd-ex.done .wd-ex-name { color:var(--ink2); text-decoration:line-through; text-decoration-color:var(--ink3); }
.wd-ex-muscle { font-size:11.5px; color:var(--ink3); font-weight:600; margin-top:1px; }
.wd-ex-rx { text-align:right; flex-shrink:0; }
.wd-ex-rx .sr { font-weight:800; font-size:15px; font-family:'Bricolage Grotesque'; white-space:nowrap; }
.wd-ex-rx .wt { font-size:11.5px; color:var(--coral); font-weight:700; }
.wd-chev { color:var(--ink3); flex-shrink:0; transition:transform .2s; }
.wd-chev.open { transform:rotate(180deg); }

.wd-ex-body { padding:0 14px 14px; border-top:1px dashed var(--line); margin-top:-1px; }
.wd-ex-body.collapsed { display:none; }
.wd-detail-row { font-size:13px; color:var(--ink2); line-height:1.5; margin:11px 0 0; }
.wd-detail-row b { color:var(--ink); font-weight:700; }
.wd-tagrow { display:flex; gap:6px; flex-wrap:wrap; margin-top:11px; }
.wd-tag { font-size:11px; font-weight:700; padding:4px 9px; border-radius:8px; background:var(--line2); color:var(--ink2); }
.wd-alt { font-size:12.5px; color:var(--ink2); background:var(--gold-soft); border-radius:10px; padding:9px 11px; margin-top:11px; line-height:1.45; }
.wd-alt b { color:var(--gold); }

.wd-logrow { display:flex; gap:8px; margin-top:12px; }
.wd-field { flex:1; }
.wd-field label { font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--ink3); display:block; margin-bottom:4px; }
.wd-stepper { display:flex; align-items:center; border:1px solid var(--line); border-radius:11px; overflow:hidden; background:var(--surface2); }
.wd-stepper button { width:34px; height:40px; border:none; background:none; cursor:pointer; color:var(--ink2); display:flex; align-items:center; justify-content:center; }
.wd-stepper button:active { background:var(--line2); }
.wd-stepper input { width:100%; text-align:center; border:none; background:none; font-size:16px; font-weight:800; font-family:'Bricolage Grotesque'; color:var(--ink); -moz-appearance:textfield; }
.wd-stepper input::-webkit-outer-spin-button,.wd-stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}

.wd-diff { display:flex; gap:6px; margin-top:12px; }
.wd-diff button { flex:1; padding:9px 4px; border-radius:11px; border:1.5px solid var(--line); background:var(--surface); font-size:12px; font-weight:700; cursor:pointer; color:var(--ink2); transition:all .12s; }
.wd-diff button.sel-e { border-color:var(--teal); background:var(--teal-soft); color:var(--teal); }
.wd-diff button.sel-g { border-color:var(--blue); background:var(--blue-soft); color:var(--blue); }
.wd-diff button.sel-h { border-color:var(--coral); background:var(--coral-soft); color:var(--coral-ink); }

.wd-chk { display:flex; align-items:center; gap:11px; padding:11px 4px; border-bottom:1px solid var(--line2); cursor:pointer; }
.wd-chk:last-child { border-bottom:none; }
.wd-chk .nm { font-size:14px; font-weight:600; }
.wd-chk .dt { font-size:12px; color:var(--ink3); margin-left:auto; font-weight:600; white-space:nowrap; }
.wd-chk.done .nm { color:var(--ink3); text-decoration:line-through; }

.wd-cardio-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(80px,1fr)); gap:10px; margin-top:14px; }
.wd-cardio-stat { background:var(--surface2); border-radius:13px; padding:11px; text-align:center; border:1px solid var(--line2); }
.wd-cardio-stat .v { font-size:20px; font-weight:800; font-family:'Bricolage Grotesque'; color:var(--teal); line-height:1; }
.wd-cardio-stat .l { font-size:10.5px; color:var(--ink3); font-weight:700; text-transform:uppercase; letter-spacing:.05em; margin-top:4px; }

.wd-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:15px; border-radius:15px; border:none; font-size:15px; font-weight:800; font-family:'Bricolage Grotesque'; cursor:pointer; transition:transform .08s, opacity .15s; }
.wd-btn:active { transform:scale(.985); }
.wd-btn-primary { background:var(--coral); color:#fff; box-shadow:0 6px 16px rgba(244,83,58,.32); }
.wd-btn-dark { background:var(--ink); color:#fff; }
.wd-btn-ghost { background:var(--surface); color:var(--ink); border:1.5px solid var(--line); box-shadow:var(--shadow); }
.wd-btn-done { background:var(--teal-soft); color:var(--teal); }
.wd-btn:disabled { opacity:.5; cursor:default; }

.wd-note { width:100%; border:1px solid var(--line); border-radius:13px; padding:12px; font-family:inherit; font-size:14px; resize:vertical; background:var(--surface2); color:var(--ink); margin-top:6px; }
.wd-note:focus { outline:none; border-color:var(--coral); }

.wd-tiles { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:0 20px; }
.wd-tile { background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:var(--shadow); }
.wd-tile .lab { font-size:11.5px; font-weight:700; color:var(--ink3); text-transform:uppercase; letter-spacing:.07em; display:flex; align-items:center; gap:6px; }
.wd-tile .num { font-size:30px; font-weight:800; font-family:'Bricolage Grotesque'; line-height:1; margin-top:8px; letter-spacing:-.02em; }
.wd-tile .num small { font-size:14px; color:var(--ink3); font-weight:700; }

.wd-wi { display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid var(--line2); }
.wd-wi:last-child { border-bottom:none; }
.wd-wi .d { font-size:13px; font-weight:700; }
.wd-wi .n { font-size:12px; color:var(--ink3); margin-top:1px; }

.wd-wi .delta.dn { background:var(--teal-soft); color:var(--teal); }

.wd-week-card .badge { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800; font-family:'Bricolage Grotesque'; font-size:15px; flex-shrink:0; }
.wd-week-card { display:flex; align-items:center; gap:14px; padding:15px; cursor:pointer; }

.wd-hist-sum .badge .dnum { font-size:17px; font-weight:800; }

.wd-rest-card { text-align:center; padding:34px 22px; }

/* ============================== PROGRESSION LOGIC ============================== */
const INCREMENT = { dumbbell: 2.5, machine: 5, cable: 5, bodyweight: 0 };
const round = (v, step) => Math.round(v / step) * step;

function weekInfo(week) {
  const cycle = Math.floor((week - 1) / 4);
  const blockWeek = ((week - 1) % 4) + 1;
  return { cycle, blockWeek, isDeload: blockWeek === 4 };
}

function recommend(ex, week, bonusLevels = 0) {
  const { cycle, blockWeek, isDeload } = weekInfo(week);
  const inc = INCREMENT[ex.equip] ?? 2.5;
  const bodyweight = ex.startWeight === 0;
  const repBonus = isDeload ? 0 : (blockWeek - 1) * 2;
  let reps = ex.reps + repBonus;
  let sets = isDeload ? Math.max(2, ex.sets - 1) : ex.sets;
  let weight = 0;
  if (!bodyweight) {
    weight = ex.startWeight * (1 + 0.08 * cycle) + bonusLevels * inc;
    if (isDeload) weight *= 0.9;
    const stepRound = ex.equip === "dumbbell" ? 2.5 : 5;
    weight = Math.max(stepRound, round(weight, stepRound));
  }
  return { sets, reps, weight, isDeload, bodyweight };
}

function recommendCardio(c, week) {
  const { isDeload } = weekInfo(week);
  const step = Math.floor((week - 1) / 3);
  let duration = c.baseDuration + Math.min(week - 1, c.maxAdd);
  if (isDeload) duration = Math.round(duration * 0.85);
  const out = { duration };
  if (c.incline != null) out.incline = c.incline + step;
  if (c.speed != null) out.speed = +(c.speed + step * 0.3).toFixed(1);
  if (c.resistance != null) out.resistance = c.resistance + step;
  if (c.level != null) out.level = c.level + step;
  return out;
}

/* per-exercise progression state: { level, hardStreak } */
function normEx(s) {
  if (typeof s === "number") return { level: s, hardStreak: 0 };
  if (s && typeof s === "object") return { level: s.level || 0, hardStreak: s.hardStreak || 0 };
  return { level: 0, hardStreak: 0 };
}
const exLevel = (s) => normEx(s).level;

/* Smart progression: weighs difficulty rating, reps completed, whether the lift
   was done at all, repeated "too hard" streaks, and recent missed workouts. */
function nextExState(prevEntry, ex, target, exLog, missedRecently) {
  const cur = normEx(prevEntry);
  if (ex.startWeight === 0) return cur;          // bodyweight: reps progress only
  if (!exLog || !exLog.done) return cur;          // skipped this session -> hold (no punish)
  let { level, hardStreak } = cur;
  const repsDone = Number(exLog.reps ?? 0);
  const wtUsed = Number(exLog.weight ?? target.weight);
  const metReps = repsDone >= target.reps;
  const metWeight = wtUsed >= target.weight;
  const diff = exLog.difficulty;

  if (diff === "hard") {
    hardStreak += 1;
    level = Math.max(-2, level - 1);
    if (hardStreak >= 2) { level = Math.max(-2, level - 1); hardStreak = 0; } // repeated too-hard -> ease more
  } else if (!metReps) {
    level = Math.max(-2, level - 1);              // missed target reps -> ease slightly
    hardStreak = 0;
  } else if (diff === "easy" && metReps && metWeight && !missedRecently) {
    level = Math.min(3, level + 1);               // crushed it -> nudge up (unless just returning from a miss)
    hardStreak = 0;
  } else {
    hardStreak = 0;                                // "just right" or held target -> stay
  }
  return { level, hardStreak };
}

/* ============================== HELPERS ============================== */
const todayKey = (d = new Date()) => {
  const x = new Date(d);
  return `${x.getFullYear()}-${String(x.getMonth() + 1).padStart(2, "0")}-${String(x.getDate()).padStart(2, "0")}`;
};
const DOW = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
function programForDate(d = new Date()) {
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return null;
  return PROGRAM[dow - 1];
}
function progFromKey(key) {
  const [y, m, d] = key.split("-").map(Number);
  return programForDate(new Date(y, m - 1, d));
}
function fmtDate(key) {
  const [y, m, dd] = key.split("-").map(Number);
  return new Date(y, m - 1, dd).toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}
function prevWeekdayMissed(logs) {
  const d = new Date(); d.setDate(d.getDate() - 1);
  let guard = 0;
  while (guard++ < 8) {
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) return !(logs[todayKey(d)] && logs[todayKey(d)].completed);
    d.setDate(d.getDate() - 1);
  }
  return false;
}

/* localStorage with in-memory fallback (works in real browsers + home-screen apps;
   degrades gracefully where storage is sandboxed). */
const _mem = {};
const LS = {
  get(key, fb) {
    try { const v = localStorage.getItem(key); if (v != null) return JSON.parse(v); } catch (e) {}
    return key in _mem ? _mem[key] : fb;
  },
  set(key, val) {
    _mem[key] = val;

function Ring({ pct, size = 54, stroke = 6, color = "var(--coral)" }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  return (
    <div className="wd-ring-wrap" style={{ width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,.25)" strokeWidth={stroke} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={c} strokeDashoffset={c * (1 - pct / 100)} strokeLinecap="round"
          transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset .5s" }} />
      </svg>
      <div className="wd-ring-txt" style={{ color: "#fff" }}>{Math.round(pct)}%</div>
    </div>
  );
}
function Stepper({ value, onChange, step = 1, min = 0 }) {
  return (
    <div className="wd-stepper">
      <button onClick={() => onChange(Math.max(min, +(Number(value || 0) - step).toFixed(2)))}><Minus size={16} /></button>
      <input type="number" value={value} onChange={(e) => onChange(e.target.value === "" ? "" : +e.target.value)} />
      <button onClick={() => onChange(+(Number(value || 0) + step).toFixed(2))}><Plus size={16} /></button>
    </div>
  );
}
function SectionHeader({ sec, sub }) {
  const m = SECTION_META[sec]; const { Icon } = m;
  return (
    <div className="wd-sec-h">
      <div className="ico" style={{ background: m.bg, color: m.color }}><Icon size={16} /></div>
      <h2>{m.label}</h2>{sub && <span className="sub">{sub}</span>}
    </div>
  );
}
function SectionHeaderPlain({ icon, color, bg, title }) {
  return (
    <div className="wd-sec-h">
      <div className="ico" style={{ background: bg, color }}>{icon}</div><h2>{title}</h2>
    </div>
  );
}

/* Generic expandable movement card used by every section for a consistent look. */
function MoveCard({ name, summary, meta, metaColor, done, onToggle, rows, accentIcon }) {
  const [open, setOpen] = useState(false);
  return (
    <div className={`wd-ex ${done ? "done" : ""}`}>
      <div className="wd-ex-top">
        {onToggle ? (
          <button className="wd-check" onClick={onToggle}>
            {done ? <CheckCircle2 size={26} color="var(--teal)" /> : <Circle size={26} color="var(--ink3)" />}
          </button>
        ) : (
          <span style={{ flexShrink: 0 }}>{accentIcon}</span>
        )}
        <div style={{ flex: 1, minWidth: 0 }} onClick={() => setOpen((o) => !o)}>
          <div className="wd-ex-name">{name}</div>
          {summary && <div className="wd-ex-muscle">{summary}</div>}
        </div>
        {meta && <div className="wd-ex-rx" onClick={() => setOpen((o) => !o)}><div className="sr" style={{ color: metaColor || "var(--ink)" }}>{meta}</div></div>}
        <ChevronDown size={18} className={`wd-chev ${open ? "open" : ""}`} onClick={() => setOpen((o) => !o)} />
      </div>
      <div className={`wd-ex-body ${open ? "" : "collapsed"}`}>
        {rows.map((r, i) => {
          if (r.kind === "mod") return <div key={i} className="wd-mod"><b>{r.label}:</b> {r.text}</div>;
          if (r.kind === "harder") return <div key={i} className="wd-harder"><b>{r.label}:</b> {r.text}</div>;
          if (r.kind === "alt") return <div key={i} className="wd-alt"><b>{r.label}:</b> {r.text}</div>;
          return <p key={i} className="wd-detail-row"><b>{r.label}:</b> {r.text}</p>;
        })}
        <SafetyStrip />
      </div>
    </div>
  );
}

  useEffect(() => { LS.set(STORE.profile, profile); }, [profile]);
  useEffect(() => { LS.set(STORE.settings, settings); }, [settings]);
  useEffect(() => { LS.set(STORE.weighins, weighins); }, [weighins]);
  useEffect(() => { LS.set(STORE.logs, logs); }, [logs]);
  useEffect(() => { LS.set(STORE.exstate, exstate); }, [exstate]);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2400); };

  const sortedWI = useMemo(() => [...weighins].sort((a, b) => a.date.localeCompare(b.date)), [weighins]);
  const currentWeight = sortedWI.length ? sortedWI[sortedWI.length - 1].weight : profile.startWeight;
  const completedLogs = useMemo(() => Object.entries(logs).filter(([, v]) => v.completed), [logs]);
  const totalWorkouts = completedLogs.length;
  const completedThisProgramWeek = useMemo(
    () => Object.values(logs).filter((l) => l.completed && (l.week || 0) === week).length, [logs, week]);
  const canAdvance = completedThisProgramWeek >= ADVANCE_THRESHOLD;

  const streak = useMemo(() => {
    let s = 0; const d = new Date();
    for (let i = 0; i < 60; i++) {
      const dow = d.getDay();
      if (dow !== 0 && dow !== 6) {
        const k = todayKey(d);
        if (logs[k] && logs[k].completed) s++;
        else if (k !== todayKey()) break;
      }
      d.setDate(d.getDate() - 1);
    }
    return s;
  }, [logs]);

  const weekCompletion = useMemo(() => {
    const now = new Date(); const monday = new Date(now);
    monday.setDate(now.getDate() - ((now.getDay() + 6) % 7));
    let done = 0;
    for (let i = 0; i < 5; i++) {
      const dd = new Date(monday); dd.setDate(monday.getDate() + i);
      if (logs[todayKey(dd)] && logs[todayKey(dd)].completed) done++;
    }
    return { done, pct: (done / 5) * 100 };
  }, [logs]);

  const getLog = (dateKey, prog) =>
    logs[dateKey] || { focusKey: prog ? prog.key : null, completed: false, exercises: {}, items: {}, cardio: {}, notes: "" };
  const updateLog = (dateKey, mutator) => {
    setLogs((prev) => {
      const cur = prev[dateKey] || { completed: false, exercises: {}, items: {}, cardio: {}, notes: "" };
      const next = mutator({ ...cur, exercises: { ...cur.exercises }, items: { ...cur.items }, cardio: { ...cur.cardio } });
      return { ...prev, [dateKey]: next };
    });
  };
  const advanceWeek = () => { setSettings((s) => ({ ...s, week: (s.week || 1) + 1 })); flash(`Welcome to Week ${week + 1}! 💪`); window.scrollTo(0, 0); };

  return (
    <div className="wd-root">
      <style>{STYLES}</style>
      <div className="wd-shell">
        {tab === "today" && <TodayView {...{ profile, week, getLog, updateLog, exstate, setExstate, flash, logs, canAdvance, completedThisProgramWeek, advanceWeek }} />}
        {tab === "week" && <WeekView {...{ week, logs, viewDayKey, setViewDayKey, canAdvance, completedThisProgramWeek, advanceWeek }} />}
        {tab === "history" && <HistoryView {...{ logs }} />}
        {tab === "progress" && <ProgressView {...{ profile, currentWeight, sortedWI, totalWorkouts, streak, weekCompletion, week, logs }} />}
        {tab === "weight" && <WeightView {...{ profile, sortedWI, setWeighins, currentWeight, flash }} />}
        {tab === "settings" && <SettingsView {...{ profile, setProfile, settings, setSettings, flash, logs, weighins, exstate, setLogs, setWeighins, setExstate }} />}
      </div>

      {toast && <div className="wd-toast"><CheckCircle2 size={18} />{toast}</div>}

      <nav className="wd-nav">
        <div className="wd-nav-inner">
          {[
            { id: "today", label: "Today", Icon: Home },
            { id: "week", label: "Week", Icon: Calendar },
            { id: "history", label: "History", Icon: History },
            { id: "progress", label: "Progress", Icon: BarChart3 },
            { id: "weight", label: "Weight", Icon: Scale },
            { id: "settings", label: "More", Icon: Settings },
          ].map(({ id, label, Icon }) => (
            <button key={id} className={tab === id ? "active" : ""} onClick={() => { setTab(id); window.scrollTo(0, 0); }}>
              <Icon size={20} className="nav-ico" /> {label}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

/* ============================== TODAY VIEW ============================== */
function TodayView({ profile, week, getLog, updateLog, exstate, setExstate, flash, logs, canAdvance, completedThisProgramWeek, advanceWeek }) {
  const now = new Date();
  const prog = programForDate(now);
  const dateKey = todayKey(now);
  const [expanded, setExpanded] = useState({});
  const log = getLog(dateKey, prog);

  const Header = (
    <div className="wd-top">
      <div>
        <h1>{DOW[now.getDay()]} · Week {week}</h1>
        <p className="big wd-display">Hi {profile.name || "there"} 👋</p>
      </div>
      <div className="wd-avatar">{(profile.name || "C").slice(0, 1).toUpperCase()}</div>
    </div>
  );

  if (!prog) {
    return (
      <div className="wd-fade">
        {Header}
        {canAdvance && <AdvanceBanner week={week} count={completedThisProgramWeek} onAdvance={advanceWeek} />}
        <div className="wd-sec">
          <div className="wd-card wd-rest-card">
            <div className="em"><Moon size={30} /></div>
            <h2 className="wd-display" style={{ fontSize: 22, margin: "0 0 6px" }}>Recovery Day</h2>
            <p style={{ color: "var(--ink2)", fontSize: 14, lineHeight: 1.55, maxWidth: 380, margin: "0 auto" }}>
              Weekends are for rest and repair — that's when your muscles actually rebuild. Stay lightly active and let your body recover for a strong week ahead.
            </p>
          </div>
        </div>
        <div className="wd-sec">
          <div className="wd-card wd-pad">
            <div className="wd-sec-h" style={{ margin: 0 }}>
              <div className="ico" style={{ background: "var(--violet-soft)", color: "var(--violet)" }}><Sparkles size={16} /></div>
              <h2>Recovery checklist</h2>
            </div>
            {[["Light movement", "10–20 min easy walk or gentle yoga"], ["Mobility & stretch", "5–10 min full-body stretching"],
              ["Hydration", "Aim for plenty of water today"], ["Sleep", "Target 7–9 hours — recovery happens here"],
              ["Protein", "Keep protein up to support muscle repair"]].map(([n, d]) => (
              <div key={n} className="wd-chk" style={{ cursor: "default" }}>
                <Circle size={18} color="var(--violet)" /><span className="nm">{n}</span><span className="dt">{d}</span>
              </div>
            ))}
          </div>
        </div>
        <Coach text={<><b>Why rest matters:</b> progressive overload only works if you recover. Two full rest days each week keeps fat loss steady and protects your joints. See you Monday for {PROGRAM[0].focus}!</>} />
      </div>
    );
  }

  const strengthIds = prog.strength.map((e) => e.id);
  const allItemIds = [...prog.warmup, ...prog.core, ...prog.cooldown].map((i) => i.id);
  const doneStrength = strengthIds.filter((id) => log.exercises[id] && log.exercises[id].done).length;
  const doneItems = allItemIds.filter((id) => log.items[id]).length;
  const cardioDone = log.cardio && log.cardio.done ? 1 : 0;
  const totalUnits = strengthIds.length + allItemIds.length + 1;
  const doneUnits = doneStrength + doneItems + cardioDone;
  const pct = (doneUnits / totalUnits) * 100;
  const cardioRx = recommendCardio(prog.cardio, week);
  const { isDeload } = weekInfo(week);

  const toggleStrength = (ex) => updateLog(dateKey, (l) => {
    const cur = l.exercises[ex.id] || {};
    if (!cur.done) {
      const rx = recommend(ex, week, exLevel(exstate[ex.id]));
      l.exercises[ex.id] = { done: true, weight: cur.weight ?? rx.weight, reps: cur.reps ?? rx.reps, difficulty: cur.difficulty || null };
    } else l.exercises[ex.id] = { ...cur, done: false };
    return l;
  });
  const setExField = (ex, field, val) => updateLog(dateKey, (l) => { l.exercises[ex.id] = { ...(l.exercises[ex.id] || {}), [field]: val }; return l; });
  const toggleItem = (id) => updateLog(dateKey, (l) => { l.items[id] = !l.items[id]; return l; });
  const toggleCardio = () => updateLog(dateKey, (l) => { l.cardio = { ...l.cardio, done: !(l.cardio && l.cardio.done) }; return l; });

  const completeWorkout = () => {
    if (pct < 80) {
      const ok = window.confirm(`You've completed about ${Math.round(pct)}% of today's workout.\n\nMark it complete anyway? (Recommended: finish at least 80% first.)`);
      if (!ok) return;
    }
    const missed = prevWeekdayMissed(logs);
    setExstate((prev) => {
      const next = { ...prev };
      prog.strength.forEach((ex) => {
        const target = recommend(ex, week, exLevel(prev[ex.id]));
        next[ex.id] = nextExState(prev[ex.id], ex, target, log.exercises[ex.id], missed);
      });
      return next;
    });
    updateLog(dateKey, (l) => { l.completed = true; l.completedAt = Date.now(); l.week = week; l.focusKey = prog.key; return l; });
    flash("Workout complete! 🎉");
  };

  return (
    <div className="wd-fade">
      {Header}
      {canAdvance && <AdvanceBanner week={week} count={completedThisProgramWeek} onAdvance={advanceWeek} />}

      <div className="wd-hero" style={{ background: prog.gradient }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 14 }}>
          <div style={{ flex: 1 }}>
            <div className="tag">Today's Workout</div>
            <div className="ttl wd-display">{prog.focus}</div>
            <div className="meta">
              <span><Dumbbell size={14} /> {prog.strength.length} lifts</span>
              <span><HeartPulse size={14} /> {cardioRx.duration} min cardio</span>
              <span><Timer size={14} /> ~{30 + prog.strength.length * 4} min</span>
            </div>
          </div>
          <Ring pct={pct} />
        </div>
        {isDeload && <div className="wd-pill" style={{ background: "rgba(255,255,255,.2)", color: "#fff", marginTop: 12 }}><Info size={13} /> Deload week — lighter loads to recover</div>}
      </div>

      <SafetyBasics />

      <WarmupSection items={prog.warmup} done={log.items} onToggle={toggleItem} />

      <div className="wd-sec">
        <SectionHeader sec="strength" sub={`${doneStrength}/${strengthIds.length} done`} />
        {prog.strength.map((ex) => {
          const lvl = exLevel(exstate[ex.id]);
          const rx = recommend(ex, week, lvl);
          const exLog = log.exercises[ex.id] || {};
          const isOpen = expanded[ex.id];
          return (
            <div key={ex.id} className={`wd-ex ${exLog.done ? "done" : ""}`}>
              <div className="wd-ex-top">
                <button className="wd-check" onClick={() => toggleStrength(ex)}>
                  {exLog.done ? <CheckCircle2 size={26} color="var(--teal)" /> : <Circle size={26} color="var(--ink3)" />}
                </button>
                <div style={{ flex: 1, minWidth: 0 }} onClick={() => setExpanded((e) => ({ ...e, [ex.id]: !e[ex.id] }))}>
                  <div className="wd-ex-name">{ex.name}</div>
                  <div className="wd-ex-muscle">{ex.muscle}</div>
                </div>
                <div className="wd-ex-rx" onClick={() => setExpanded((e) => ({ ...e, [ex.id]: !e[ex.id] }))}>
                  <div className="sr">{rx.sets} × {rx.reps}</div>
                  <div className="wt">{rx.bodyweight ? "Bodyweight" : `${rx.weight} lb`}{lvl !== 0 && !rx.bodyweight ? (lvl > 0 ? " ↑" : " ↓") : ""}</div>
                </div>
                <ChevronDown size={18} className={`wd-chev ${isOpen ? "open" : ""}`} onClick={() => setExpanded((e) => ({ ...e, [ex.id]: !e[ex.id] }))} />
              </div>
              <div className={`wd-ex-body ${isOpen ? "" : "collapsed"}`}>
                <div className="wd-tagrow">
                  <span className="wd-tag">Rest {ex.rest}s</span>
                  <span className="wd-tag">{ex.equip}</span>
                  {!rx.bodyweight && <span className="wd-tag">Start {ex.startWeight} lb</span>}
                </div>
                <p className="wd-detail-row"><b>How to:</b> {ex.instr}</p>
                <p className="wd-detail-row"><b>Form:</b> {ex.form}</p>
                <div className="wd-alt"><b>No equipment / alt:</b> {ex.alts.join(" · ")}</div>
                <div className="wd-logrow">
                  {!rx.bodyweight && (
                    <div className="wd-field">
                      <label>Weight used (lb)</label>
                      <Stepper value={exLog.weight ?? rx.weight} step={ex.equip === "dumbbell" ? 2.5 : 5} onChange={(v) => setExField(ex, "weight", v)} />
                    </div>
                  )}
                  <div className="wd-field">
                    <label>Reps done</label>
                    <Stepper value={exLog.reps ?? rx.reps} step={1} onChange={(v) => setExField(ex, "reps", v)} />
                  </div>
                </div>
                <div className="wd-diff">
                  {[["easy", "Too easy", "sel-e"], ["good", "Just right", "sel-g"], ["hard", "Too hard", "sel-h"]].map(([val, lbl, cls]) => (
                    <button key={val} className={exLog.difficulty === val ? cls : ""} onClick={() => setExField(ex, "difficulty", val)}>{lbl}</button>
                  ))}
                </div>
                <p style={{ fontSize: 11.5, color: "var(--ink3)", marginTop: 8, fontWeight: 600 }}>
                  Your rating + reps logged tune next week's weight automatically.
                </p>
              </div>
            </div>
          );
        })}
      </div>

      <div className="wd-sec">
        <SectionHeader sec="cardio" />
        <div className={`wd-ex ${log.cardio && log.cardio.done ? "done" : ""}`}>
          <div className="wd-ex-top">
            <button className="wd-check" onClick={toggleCardio}>
              {log.cardio && log.cardio.done ? <CheckCircle2 size={26} color="var(--teal)" /> : <Circle size={26} color="var(--ink3)" />}
            </button>
            <div style={{ flex: 1 }} onClick={() => setExpanded((e) => ({ ...e, [prog.cardio.id]: !e[prog.cardio.id] }))}>
              <div className="wd-ex-name">{prog.cardio.name}</div>
              <div className="wd-ex-muscle">{prog.cardio.machine}</div>
            </div>
            <div className="wd-ex-rx" onClick={() => setExpanded((e) => ({ ...e, [prog.cardio.id]: !e[prog.cardio.id] }))}><div className="sr" style={{ color: "var(--teal)" }}>{cardioRx.duration} min</div></div>
            <ChevronDown size={18} className={`wd-chev ${expanded[prog.cardio.id] ? "open" : ""}`} onClick={() => setExpanded((e) => ({ ...e, [prog.cardio.id]: !e[prog.cardio.id] }))} />
          </div>
          <div className={`wd-ex-body ${expanded[prog.cardio.id] ? "" : "collapsed"}`}>
            <div className="wd-cardio-grid">
              <div className="wd-cardio-stat"><div className="v">{cardioRx.duration}</div><div className="l">Minutes</div></div>
              {cardioRx.incline != null && <div className="wd-cardio-stat"><div className="v">{cardioRx.incline}%</div><div className="l">Incline</div></div>}
              {cardioRx.speed != null && <div className="wd-cardio-stat"><div className="v">{cardioRx.speed}</div><div className="l">mph</div></div>}
              {cardioRx.resistance != null && <div className="wd-cardio-stat"><div className="v">{cardioRx.resistance}</div><div className="l">Resistance</div></div>}
              {cardioRx.level != null && <div className="wd-cardio-stat"><div className="v">{cardioRx.level}</div><div className="l">Level</div></div>}
            </div>
            <p className="wd-detail-row"><b>How to:</b> {(CARDIO_INFO[prog.cardio.id] || {}).how}</p>
            <p className="wd-detail-row"><b>Posture &amp; form:</b> {(CARDIO_INFO[prog.cardio.id] || {}).posture}</p>
            <p className="wd-detail-row"><b>Intensity:</b> {(CARDIO_INFO[prog.cardio.id] || {}).intensity}</p>
            <p className="wd-detail-row"><b>How to progress:</b> {(CARDIO_INFO[prog.cardio.id] || {}).progress}</p>
            <p className="wd-detail-row"><b>Coach note:</b> {prog.cardio.note}</p>
            <div className="wd-mod"><b>Beginner modification:</b> {(CARDIO_INFO[prog.cardio.id] || {}).beginner}</div>
            <div className="wd-alt"><b>Alternatives:</b> {prog.cardio.alts.join(" · ")}</div>
            <SafetyStrip />
          </div>
        </div>
      </div>

      <CoreSection items={prog.core} done={log.items} onToggle={toggleItem} />
      <CooldownSection items={prog.cooldown} done={log.items} onToggle={toggleItem} />

      <div className="wd-sec">
        <div className="wd-card wd-pad">
          <label style={{ fontSize: 11, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: "var(--ink3)" }}>Workout notes</label>
          <textarea className="wd-note" rows={2} placeholder="How did it feel? Energy, soreness, wins…"
            value={log.notes || ""} onChange={(e) => updateLog(dateKey, (l) => { l.notes = e.target.value; return l; })} />
        </div>
      </div>

      <div className="wd-sec">
        {log.completed ? (
          <button className="wd-btn wd-btn-done"><CheckCircle2 size={20} /> Workout completed</button>
        ) : (
          <button className="wd-btn wd-btn-primary" onClick={completeWorkout}><Trophy size={20} /> Complete Workout ({Math.round(pct)}%)</button>
        )}
      </div>
    </div>
  );
}

  return (

      <div className="wd-top"><div><h1>Your Plan · Week {week}</h1><p className="big wd-display">This Week</p></div></div>
      {canAdvance && <AdvanceBanner week={week} count={completedThisProgramWeek} onAdvance={advanceWeek} />}
      <div className="wd-sec">
        {PROGRAM.map((p, i) => {
          const dd = new Date(monday); dd.setDate(monday.getDate() + i);

          return (

          <div><div style={{ fontWeight: 700, fontSize: 15 }}>Sat & Sun — Recovery</div><div style={{ fontSize: 12.5, color: "var(--ink3)", fontWeight: 600 }}>Rest, stretch, light walks. Muscle is built on rest days.</div></div>
        </div>
      </div>
    </div>
  );
}

/* ============================== HISTORY VIEW ============================== */
function HistoryView({ logs }) {
  const [open, setOpen] = useState({});
  const entries = useMemo(
    () => Object.entries(logs).filter(([, v]) => v.completed).sort((a, b) => b[0].localeCompare(a[0])), [logs]);

  return (
    <div className="wd-fade">
      <div className="wd-top"><div><h1>Completed Sessions</h1><p className="big wd-display">History</p></div></div>
      <div className="wd-sec">
        {entries.length === 0 && (
          <div className="wd-card wd-pad"><div className="wd-empty">No completed workouts yet.<br />Finish a session on the Today tab and it'll show up here.</div></div>
        )}
        {entries.map(([date, log]) => {
          const prog = progFromKey(date) || PROGRAM.find((p) => p.key === log.focusKey);
          const [y, m, dd] = date.split("-").map(Number);
          const dnum = dd; const dmon = new Date(y, m - 1, dd).toLocaleDateString(undefined, { month: "short" });
          const counts = { easy: 0, good: 0, hard: 0 };
          if (prog) prog.strength.forEach((ex) => { const d = log.exercises[ex.id] && log.exercises[ex.id].difficulty; if (d && counts[d] != null) counts[d]++; });
          const isOpen = open[date];
          return (
            <div key={date} className="wd-card" style={{ marginBottom: 11 }}>
              <div className="wd-hist-sum" onClick={() => setOpen((o) => ({ ...o, [date]: !o[date] }))}>
                <div className="badge"><div className="dnum">{dnum}</div><div className="dmon">{dmon}</div></div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{prog ? prog.focus : "Workout"}</div>
                  <div style={{ fontSize: 12, color: "var(--ink3)", fontWeight: 600, marginTop: 2 }}>
                    {fmtDate(date)}{log.week ? ` · Week ${log.week}` : ""}{log.cardio && log.cardio.done ? " · cardio ✓" : ""}
                  </div>
                  <div style={{ display: "flex", gap: 5, marginTop: 7, flexWrap: "wrap" }}>
                    {counts.easy > 0 && <span className="wd-chip" style={{ background: "var(--teal-soft)", color: "var(--teal)" }}>{counts.easy} easy</span>}
                    {counts.good > 0 && <span className="wd-chip" style={{ background: "var(--blue-soft)", color: "var(--blue)" }}>{counts.good} just right</span>}
                    {counts.hard > 0 && <span className="wd-chip" style={{ background: "var(--coral-soft)", color: "var(--coral-ink)" }}>{counts.hard} hard</span>}
                  </div>
                </div>
                <ChevronDown size={18} className={`wd-chev ${isOpen ? "open" : ""}`} />
              </div>
              {isOpen && prog && (
                <div style={{ padding: "0 16px 16px", borderTop: "1px dashed var(--line)" }}>
                  {prog.strength.map((ex) => {
                    const el = log.exercises[ex.id];
                    return (
                      <div key={ex.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderBottom: "1px solid var(--line2)" }}>
                        {el && el.done ? <CheckCircle2 size={16} color="var(--teal)" /> : <Circle size={16} color="var(--ink3)" />}
                        <span style={{ fontSize: 13.5, fontWeight: 600, flex: 1 }}>{ex.name}</span>
                        <span style={{ fontSize: 13, fontWeight: 700, fontFamily: "'Bricolage Grotesque'", color: "var(--ink2)" }}>
                          {el ? (ex.startWeight === 0 ? `${el.reps ?? "–"} reps` : `${el.weight ?? "–"} lb × ${el.reps ?? "–"}`) : "—"}
                        </span>
                      </div>
                    );
                  })}
                  {log.cardio && (
                    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 0", borderBottom: "1px solid var(--line2)" }}>
                      {log.cardio.done ? <CheckCircle2 size={16} color="var(--teal)" /> : <Circle size={16} color="var(--ink3)" />}
                      <span style={{ fontSize: 13.5, fontWeight: 600, flex: 1 }}>{prog.cardio.name}</span>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "var(--ink2)" }}>{recommendCardio(prog.cardio, log.week || 1).duration} min</span>
                    </div>
                  )}
                  {log.notes ? <p style={{ fontSize: 13, color: "var(--ink2)", marginTop: 11, lineHeight: 1.5, fontStyle: "italic" }}>“{log.notes}”</p> : null}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ============================== PROGRESS VIEW ============================== */
function ProgressView({ profile, currentWeight, sortedWI, totalWorkouts, streak, weekCompletion, week, logs }) {
  const lost = +(profile.startWeight - currentWeight).toFixed(1);
  const remaining = +(currentWeight - profile.goalWeight).toFixed(1);
  const totalToLose = profile.startWeight - profile.goalWeight;
  const journeyPct = Math.max(0, Math.min(100, (lost / totalToLose) * 100));
  const weightData = sortedWI.map((w) => ({ date: fmtDate(w.date).split(",")[0], weight: w.weight }));

  const weeklyVolume = useMemo(() => {
    const buckets = {};
    Object.values(logs).forEach((l) => { if (l.completed) { const wk = l.week || 1; buckets[wk] = (buckets[wk] || 0) + 1; } });
    const max = Math.max(week, ...Object.keys(buckets).map(Number), 1);
    const arr = [];
    for (let i = 1; i <= Math.min(max, 12); i++) arr.push({ wk: `W${i}`, workouts: buckets[i] || 0 });
    return arr;
  }, [logs, week]);

  const { cycle } = weekInfo(week);
  const strengthGain = Math.round(0.08 * cycle * 100);

  return (
    <div className="wd-fade">
      <div className="wd-top"><div><h1>Your Journey</h1><p className="big wd-display">Progress</p></div></div>
      <div className="wd-sec">
        <div className="wd-card wd-pad" style={{ background: "linear-gradient(135deg,#1C1A17,#34302a)", color: "#fff", border: "none" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
            <div>
              <div style={{ fontSize: 12, opacity: .7, fontWeight: 700, letterSpacing: ".08em", textTransform: "uppercase" }}>Current Weight</div>
              <div className="wd-display" style={{ fontSize: 42, lineHeight: 1, marginTop: 4 }}>{currentWeight}<span style={{ fontSize: 18, opacity: .6 }}> lb</span></div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 12, opacity: .7, fontWeight: 700 }}>Goal</div>
              <div className="wd-display" style={{ fontSize: 24 }}>{profile.goalWeight} lb</div>
            </div>
          </div>
          <div style={{ height: 8, background: "rgba(255,255,255,.15)", borderRadius: 20, marginTop: 16, overflow: "hidden" }}>
            <div style={{ width: `${journeyPct}%`, height: "100%", background: "linear-gradient(90deg,#F4533A,#D98A21)", borderRadius: 20, transition: "width .6s" }} />
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10, fontSize: 13, fontWeight: 600 }}>
            <span style={{ color: lost >= 0 ? "#7FD8B8" : "#FFB3A6" }}>{lost >= 0 ? `${lost} lb lost` : `${Math.abs(lost)} lb up`}</span>
            <span style={{ opacity: .8 }}>{remaining > 0 ? `${remaining} lb to go` : "Goal reached! 🎉"}</span>
          </div>
        </div>
      </div>

      <div className="wd-sec">
        <SectionHeaderPlain icon={<TrendingDown size={16} />} color="var(--teal)" bg="var(--teal-soft)" title="Weight Trend" />
        <div className="wd-card wd-pad">
          {weightData.length > 1 ? (
            <div style={{ height: 210 }}>
              <ResponsiveContainer width="100%" height="100%">
                <AreaChart data={weightData} margin={{ top: 6, right: 6, left: -18, bottom: 0 }}>
                  <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#1E7A66" stopOpacity={0.35} /><stop offset="100%" stopColor="#1E7A66" stopOpacity={0} /></linearGradient></defs>
                  <CartesianGrid strokeDasharray="3 3" stroke="#EAE3D7" vertical={false} />
                  <XAxis dataKey="date" tick={{ fontSize: 11, fill: "#A39B8E" }} axisLine={false} tickLine={false} />
                  <YAxis domain={["dataMin - 3", "dataMax + 3"]} tick={{ fontSize: 11, fill: "#A39B8E" }} axisLine={false} tickLine={false} />
                  <Tooltip contentStyle={{ borderRadius: 12, border: "1px solid #EAE3D7", fontSize: 13 }} />
                  <ReferenceLine y={profile.goalWeight} stroke="#F4533A" strokeDasharray="5 4" label={{ value: "Goal", fontSize: 11, fill: "#F4533A", position: "insideTopRight" }} />
                  <Area type="monotone" dataKey="weight" stroke="#1E7A66" strokeWidth={2.5} fill="url(#wg)" dot={{ r: 3, fill: "#1E7A66" }} />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          ) : <div className="wd-empty">Log a few weigh-ins to see your trend graph come to life.</div>}
        </div>
      </div>

      <div className="wd-tiles">
        <div className="wd-tile"><div className="lab"><Trophy size={14} color="var(--gold)" /> Total Workouts</div><div className="num">{totalWorkouts}</div><div className="sub">completed all-time</div></div>
        <div className="wd-tile"><div className="lab"><Zap size={14} color="var(--coral)" /> Current Streak</div><div className="num">{streak} <small>days</small></div><div className="sub">workout days in a row</div></div>
        <div className="wd-tile"><div className="lab"><Target size={14} color="var(--teal)" /> This Week</div><div className="num">{weekCompletion.done}<small>/5</small></div><div className="sub">{Math.round(weekCompletion.pct)}% complete</div></div>
        <div className="wd-tile"><div className="lab"><Dumbbell size={14} color="var(--violet)" /> Strength Up</div><div className="num">+{strengthGain}<small>%</small></div><div className="sub">load vs. week 1</div></div>
      </div>

      <div className="wd-sec">
        <SectionHeaderPlain icon={<BarChart3 size={16} />} color="var(--coral)" bg="var(--coral-soft)" title="Workouts by Week" />
        <div className="wd-card wd-pad">
          <div style={{ height: 170 }}>
            <ResponsiveContainer width="100%" height="100%">
              <BarChart data={weeklyVolume} margin={{ top: 6, right: 6, left: -22, bottom: 0 }}>
                <CartesianGrid strokeDasharray="3 3" stroke="#EAE3D7" vertical={false} />
                <XAxis dataKey="wk" tick={{ fontSize: 11, fill: "#A39B8E" }} axisLine={false} tickLine={false} />
                <YAxis domain={[0, 5]} ticks={[0, 1, 2, 3, 4, 5]} tick={{ fontSize: 11, fill: "#A39B8E" }} axisLine={false} tickLine={false} />
                <Tooltip cursor={{ fill: "#F2ECE2" }} contentStyle={{ borderRadius: 12, border: "1px solid #EAE3D7", fontSize: 13 }} />
                <Bar dataKey="workouts" fill="#F4533A" radius={[6, 6, 0, 0]} maxBarSize={34} />
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      </div>

      <Coach text={<><b>You're on track.</b> Steady fat loss is ~0.5–1 lb/week. Combined with progressive strength work, you're protecting lean muscle while the scale drops — exactly the goal for a toned, lean look.</>} />
    </div>
  );
}

/* ============================== WEIGHT VIEW ============================== */
function WeightView({ profile, sortedWI, setWeighins, currentWeight, flash }) {
  const [w, setW] = useState("");
  const [date, setDate] = useState(todayKey());
  const [notes, setNotes] = useState("");

  const add = () => {
    if (!w || isNaN(+w)) { flash("Enter a valid weight"); return; }
    setWeighins((prev) => [...prev.filter((x) => x.date !== date), { date, weight: +(+w).toFixed(1), notes: notes.trim() }]);
    setW(""); setNotes(""); flash("Weigh-in saved ✓");
  };
  const remove = (d) => { if (window.confirm(`Delete the weigh-in from ${fmtDate(d)}?`)) setWeighins((prev) => prev.filter((x) => x.date !== d)); };
  const reversed = [...sortedWI].reverse();

  return (
    <div className="wd-fade">
      <div className="wd-top"><div><h1>Hume Health Scale</h1><p className="big wd-display">Weigh-ins</p></div></div>
      <div className="wd-tiles">
        <div className="wd-tile"><div className="lab"><Scale size={14} color="var(--teal)" /> Current</div><div className="num">{currentWeight}<small> lb</small></div></div>
        <div className="wd-tile"><div className="lab"><Target size={14} color="var(--coral)" /> To Goal</div><div className="num">{Math.max(0, +(currentWeight - profile.goalWeight).toFixed(1))}<small> lb</small></div></div>
      </div>
      <div className="wd-sec">
        <div className="wd-card wd-pad">
          <div className="wd-sec-h" style={{ margin: "0 0 14px" }}><div className="ico" style={{ background: "var(--coral-soft)", color: "var(--coral)" }}><Plus size={16} /></div><h2>Log a weigh-in</h2></div>
          <div className="wd-row2" style={{ marginBottom: 10 }}>
            <div style={{ flex: 1 }}>
              <label style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: "var(--ink3)", display: "block", marginBottom: 5 }}>Date</label>
              <input type="date" className="wd-inline-input" value={date} onChange={(e) => setDate(e.target.value)} />
            </div>
            <div style={{ flex: 1 }}>
              <label style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: "var(--ink3)", display: "block", marginBottom: 5 }}>Weight (lb)</label>
              <input type="number" inputMode="decimal" className="wd-inline-input" placeholder="146.5" value={w} onChange={(e) => setW(e.target.value)} />
            </div>
          </div>
          <input className="wd-inline-input" placeholder="Notes (optional)" value={notes} onChange={(e) => setNotes(e.target.value)} style={{ marginBottom: 12 }} />
          <button className="wd-btn wd-btn-dark" onClick={add}><Plus size={18} /> Save weigh-in</button>
        </div>
      </div>
      <div className="wd-sec">
        <SectionHeaderPlain icon={<Calendar size={16} />} color="var(--blue)" bg="var(--blue-soft)" title="History" />
        <div className="wd-card wd-pad">
          {reversed.length === 0 && <div className="wd-empty">No weigh-ins yet.</div>}
          {reversed.map((wi, i) => {
            const prev = reversed[i + 1];
            const delta = prev ? +(wi.weight - prev.weight).toFixed(1) : null;
            return (
              <div key={wi.date} className="wd-wi">
                <div><div className="d">{fmtDate(wi.date)}</div>{wi.notes ? <div className="n">{wi.notes}</div> : null}</div>
                {delta != null && delta !== 0 && <span className={`delta ${delta < 0 ? "dn" : "up"}`}>{delta < 0 ? "▼" : "▲"} {Math.abs(delta)}</span>}
                <div className="w">{wi.weight}</div>
                <button onClick={() => remove(wi.date)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--ink3)", padding: 4 }}><X size={16} /></button>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ============================== SETTINGS VIEW ============================== */
function SettingsView({ profile, setProfile, settings, setSettings, flash, logs, weighins, exstate, setLogs, setWeighins, setExstate }) {
  const update = (k, v) => setProfile((p) => ({ ...p, [k]: v }));
  const { isDeload, blockWeek } = weekInfo(settings.week || 1);
  const fileRef = useRef(null);

  const exportData = () => {
    const blob = new Blob([JSON.stringify({ app: "workout-dashboard", version: 2, profile, settings, weighins, logs, exstate }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `workout-data-${todayKey()}.json`; a.click();
    URL.revokeObjectURL(url);
    flash("Data exported ✓");
  };
  const importData = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!window.confirm("Import will replace your current data with the contents of this file. Continue?")) { e.target.value = ""; return; }
        if (data.profile) setProfile((p) => ({ ...p, ...data.profile }));
        if (data.settings) setSettings((s) => ({ ...s, ...data.settings }));
        if (Array.isArray(data.weighins)) setWeighins(data.weighins);
        if (data.logs && typeof data.logs === "object") setLogs(data.logs);
        if (data.exstate && typeof data.exstate === "object") setExstate(data.exstate);
        flash("Data imported ✓");
      } catch (err) { flash("Couldn't read that file"); }
      e.target.value = "";
    };
    reader.readAsText(file);
  };
  const resetAll = () => {
    if (!window.confirm("Reset ALL data? This clears logs, weigh-ins and progression. Cannot be undone.")) return;
    setLogs({}); setExstate({});
    setWeighins([{ date: todayKey(), weight: profile.startWeight, notes: "Starting weight" }]);
    setSettings({ week: 1 });
    flash("All data reset");
  };

  return (
    <div className="wd-fade">
      <div className="wd-top"><div><h1>Settings</h1><p className="big wd-display">Profile & Plan</p></div></div>

      <div className="wd-sec">
        <div className="wd-card wd-pad">
          <div className="wd-sec-h" style={{ margin: "0 0 14px" }}><div className="ico" style={{ background: "var(--coral-soft)", color: "var(--coral)" }}><Award size={16} /></div><h2>Profile</h2></div>
          {[["name", "Name", "text"], ["age", "Age", "number"], ["startWeight", "Starting weight (lb)", "number"], ["goalWeight", "Goal weight (lb)", "number"], ["height", "Height", "text"]].map(([k, label, type]) => (
            <div key={k} style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: "var(--ink3)", display: "block", marginBottom: 5 }}>{label}</label>
              <input type={type} className="wd-inline-input" value={profile[k]} onChange={(e) => update(k, type === "number" ? +e.target.value : e.target.value)} />
            </div>
          ))}
        </div>
      </div>

      <div className="wd-sec">
        <div className="wd-card wd-pad">
          <div className="wd-sec-h" style={{ margin: "0 0 6px" }}><div className="ico" style={{ background: "var(--teal-soft)", color: "var(--teal)" }}><Calendar size={16} /></div><h2>Program Week</h2></div>
          <p style={{ fontSize: 13, color: "var(--ink2)", lineHeight: 1.5, margin: "0 0 14px" }}>
            Finish 5 weekday workouts and the app will offer to advance you automatically. You can also adjust the week manually here anytime.
          </p>
          <div style={{ display: "flex", alignItems: "center", gap: 14, justifyContent: "center" }}>
            <button className="wd-btn wd-btn-ghost" style={{ width: "auto", padding: "12px 18px" }} onClick={() => setSettings((s) => ({ ...s, week: Math.max(1, (s.week || 1) - 1) }))}><Minus size={18} /></button>
            <div style={{ textAlign: "center", minWidth: 90 }}>
              <div className="wd-display" style={{ fontSize: 40, lineHeight: 1 }}>{settings.week || 1}</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: isDeload ? "var(--gold)" : "var(--teal)", marginTop: 4 }}>{isDeload ? "Deload week" : `Build week ${blockWeek}/3`}</div>
            </div>
            <button className="wd-btn wd-btn-ghost" style={{ width: "auto", padding: "12px 18px" }} onClick={() => setSettings((s) => ({ ...s, week: (s.week || 1) + 1 }))}><Plus size={18} /></button>
          </div>
        </div>
      </div>

      <div className="wd-sec">
        <div className="wd-card wd-pad">
          <div className="wd-sec-h" style={{ margin: "0 0 12px" }}><div className="ico" style={{ background: "var(--violet-soft)", color: "var(--violet)" }}><Info size={16} /></div><h2>How progression works</h2></div>
          {[
            ["Double progression", "Each block you add reps first (e.g. 10→12→14), then weight bumps and reps reset — gentle and joint-friendly."],
            ["Smart auto-tuning", "It reads your difficulty rating AND the reps you actually logged: crush a lift (easy + full reps) and it nudges up; fall short or rate it too hard and it eases back."],
            ["Skips & misses respected", "Skip a lift and it holds steady — no punishment. Coming back from a missed day, it won't jump the weight up."],
            ["Repeated 'too hard'", "Rate the same lift too hard twice and it eases the load further so you stay in a safe range."],
            ["8% load steps", "Every 4-week block, base weights rise ~8% — never aggressive."],
            ["Built-in deloads", "Every 4th week is lighter so your body recovers and adapts."],
            ["Cardio progression", "Duration grows ~1 min/week; incline, speed & resistance step up every 3 weeks."],
          ].map(([t, d]) => (
            <div key={t} style={{ marginBottom: 12 }}><div style={{ fontWeight: 700, fontSize: 14 }}>{t}</div><div style={{ fontSize: 13, color: "var(--ink2)", lineHeight: 1.5 }}>{d}</div></div>
          ))}
        </div>
      </div>

      <div className="wd-sec">
        <div className="wd-card wd-pad">
          <div className="wd-sec-h" style={{ margin: "0 0 12px" }}><div className="ico" style={{ background: "var(--blue-soft)", color: "var(--blue)" }}><Home size={16} /></div><h2>How to use this app</h2></div>
          {[
            ["On your phone", "Open this page in Safari (iPhone) or Chrome (Android), then tap the Share icon and choose “Add to Home Screen.” It launches full-screen like a real app."],
            ["On your computer", "Bookmark the page, or click the install icon in your browser's address bar to keep it in your dock/taskbar."],
            ["Each session", "Open the Today tab, tap each exercise to check it off, log your weight/reps, and tap Complete Workout."],
            ["Moving devices", "Your data lives in this browser. Export it below, then Import the file on your new phone or computer to carry everything over."],
          ].map(([t, d], i) => (
            <div key={t} className="wd-help-step"><div className="n">{i + 1}</div><div className="tx"><b>{t}.</b> {d}</div></div>
          ))}
        </div>
      </div>

      <div className="wd-sec">
        <button className="wd-btn wd-btn-ghost" onClick={exportData} style={{ marginBottom: 10 }}><Download size={18} /> Export my data (JSON)</button>
        <button className="wd-btn wd-btn-ghost" onClick={() => fileRef.current && fileRef.current.click()} style={{ marginBottom: 10 }}><Upload size={18} /> Import data from file</button>
        <input ref={fileRef} type="file" accept="application/json,.json" onChange={importData} style={{ display: "none" }} />
        <button className="wd-btn wd-btn-ghost" onClick={resetAll} style={{ color: "var(--coral-ink)", borderColor: "var(--coral-soft)" }}><RotateCcw size={18} /> Reset all data</button>
      </div>

      <div style={{ textAlign: "center", fontSize: 12, color: "var(--ink3)", padding: "8px 20px 0", fontWeight: 600 }}>
        Not medical advice. Check with a professional before starting a new program. Stop if you feel pain.
      </div>
    </div>
  );
}


createRoot(document.getElementById("root")).render(React.createElement(App));

</script>

<script>
  // Patient loader: only show guidance after 25s, and tailor the message to the real cause.
  window.__appReady = false;
  setTimeout(function(){
    var r=document.getElementById("root");
    if(r && r.querySelector(".boot") && !r.querySelector(".wd-root")){
      var libsMissing = (!window.React || !window.Recharts || !window.Babel);
      var msg = libsMissing
        ? "Still downloading the app for the first time. Stay on Wi-Fi and give it a moment — once it loads successfully it is saved to your phone and opens instantly after that, even offline. If it has been more than a minute, pull down to refresh."
        : "Almost there… finishing setup. If this does not clear, pull down to refresh once.";
      r.querySelector(".boot").innerHTML = '<div class="err">'+msg+'</div><div style="margin-top:14px"><button onclick="location.reload()" style="font:600 14px system-ui;padding:10px 18px;border:none;border-radius:12px;background:#F4533A;color:#fff;">Reload</button></div>';
    }
  }, 25000);
</script>

  // Offline caching: after the first successful online load, the app works with no connection.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("./sw.js").catch(function(){ /* non-fatal */ });
    });
  }
</script>
